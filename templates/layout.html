<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Academic Information System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 56px; /* height of navbar */
            left: 0;
            width: 220px;
            height: 100%;
            background-color: #f8f9fa;
            padding-top: 20px;
        }

        /* Main content */
        .main-content {
            margin-left: 220px;
            margin-top: 70px;
            padding: 20px;
        }

        .nav-link {
            font-weight: 500;
        }

        .nav-link:hover {
            background-color: #e9ecef;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
        <span class="navbar-brand">🎓Admin panel</span>
        <div>
            <a href="{{ url_for('profile') }}" class="btn btn-danger btn-sm">👤 Profile</a>
            <a href="{{ url_for('admin_logout') }}" class="btn btn-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<!-- Sidebar -->
<div class="sidebar">
    <ul class="nav flex-column mt-3 px-2">
        <li class="nav-item">
            <a class="nav-link" href="{{ url_for('academic_dashboard') }}">📊 Dashboard</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="{{ url_for('students') }}">👨‍🎓 Students</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="{{ url_for('courses') }}">📚 Courses</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="{{ url_for('attendance') }}">🗓 Attendance</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="{{ url_for('results') }}">📄 Results</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="{{ url_for('fees') }}">💰 Fees</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="{{ url_for('notices') }}">📢 Notices</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="{{ url_for('manage_chat_history') }}">🧾 Chat History</a>
        </li>
    </ul>
</div>

<!-- Main Content -->
<div class="main-content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
