{% extends "layout.html" %}
{% block content %}
<br><br>
<h3>👨‍🎓 Student Management</h3>

<a href="{{ url_for('add_student') }}" class="btn btn-success mb-3">
➕ Add Student
</a>

<table class="table table-striped">
<tr>
    <th>Roll</th>
    <th>Name</th>
    <th>Course</th>
    <th>Semester</th>
    <th>Status</th>
</tr>

{% for s in students %}
<tr>
    <td>{{ s.roll_no }}</td>
    <td>{{ s.name }}</td>
    <td>{{ s.course }}</td>
    <td>{{ s.semester }}</td>
    <td>
        <span class="badge bg-success">{{ s.status }}</span>
    </td>
</tr>
{% endfor %}
</table>

{% endblock %}
