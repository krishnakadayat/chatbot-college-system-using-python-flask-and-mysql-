{% extends "layout.html" %}
{% block content %}
<br><br>

<h3 class="mb-4">📊 Academic Dashboard</h3>

<div class="row">
    <div class="col-md-3">
        <div class="card shadow text-center">
            <div class="card-body">
                <h5>Total Students</h5>
                <h2>{{ total_students }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card shadow text-center">
            <div class="card-body">
                <h5>Total Courses</h5>
                <h2>{{ total_courses }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card shadow text-center">
            <div class="card-body">
                <h5>Active Semester</h5>
                <h2>{{ current_semester }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card shadow text-center">
            <div class="card-body">
                <h5>Pending Fees</h5>
                <h2>Rs. {{ pending_fees }}</h2>
            </div>
        </div>
    </div>
</div>

{% endblock %}
