<!DOCTYPE html>
<html>
<head>
    <title>Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    {% extends "user/layout_user.html" %}
    {% block content %}
<h3>Feedback</h3>

<form method="POST">
    <input type="text" name="name" class="form-control mb-2" placeholder="Your Name" required>
    <input type="email" name="email" class="form-control mb-2" placeholder="Your Email" required>
    <textarea name="message" class="form-control mb-2" placeholder="Your Feedback" required></textarea>
    <button class="btn btn-success">Submit</button>
    
</form>
    {% endblock %}
</body>
</html>
