<style>

/* ===== BODY BACKGROUND ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;

    background: 
        linear-gradient(rgba(13, 110, 253, 0.75), rgba(0, 0, 0, 0.75)),
        url("{{ url_for('static', filename='images/fwu.png') }}")
        no-repeat center center fixed;

    background-size: cover;
}

/* ===== TOP HEADER ===== */
.top-header {
    position: fixed;
    top: 0;
    left: 230px;
    right: 0;
    height: 65px;
    background: linear-gradient(90deg, #0d6efd, #003c8f);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 30px;
    box-shadow: 0 3px 15px rgba(0,0,0,0.3);
    z-index: 1000;
    color: #fff;
}

/* ===== SIDEBAR ===== */
.sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: 230px;
    height: 100vh;
    background: linear-gradient(180deg, #0d6efd, #003c8f);
    padding: 20px;
    color: #fff;
    box-shadow: 5px 0 20px rgba(0,0,0,0.3);
}

.sidebar h4 {
    text-align: center;
    margin: 70px 0 30px;
    font-weight: bold;
}

.sidebar a {
    display: block;
    color: #fff;
    padding: 12px 15px;
    margin-bottom: 12px;
    border-radius: 10px;
    text-decoration: none;
    transition: 0.3s ease;
    font-weight: 500;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.2);
    padding-left: 22px;
}

/* ===== MAIN CONTENT (GLASS EFFECT) ===== */
.main-content {
    margin-left: 230px;
    margin-top: 80px;
    padding: 30px;

    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    margin-right: 30px;
    margin-bottom: 30px;

    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
}

/* ===== CARD DESIGN ===== */
.user-card {
    background: rgba(255,255,255,0.9);
    border-radius: 15px;
    padding: 20px;
    height: 100%;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    transition: 0.4s ease;
}

.user-card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* ===== LIST GROUP (COURSES STYLE) ===== */
.list-group-item {
    background: rgba(255,255,255,0.9);
    border: none;
    margin-bottom: 12px;
    border-radius: 12px;
    font-weight: 500;
    padding: 15px;
    transition: 0.3s ease;
}

.list-group-item:hover {
    background: #0d6efd;
    color: #fff;
    transform: translateX(8px);
}

/* ===== BUTTON STYLE ===== */
.btn-primary {
    background: linear-gradient(45deg, #0d6efd, #003c8f);
    border: none;
    border-radius: 8px;
}

.btn-primary:hover {
    opacity: 0.9;
}

/* ===== SCROLLBAR STYLE ===== */
::-webkit-scrollbar {
    width: 8px;
}

::-webkit-scrollbar-thumb {
    background: #0d6efd;
    border-radius: 10px;
}

</style>
</head>

<body>
<nav class="top-header">
    <!-- College Logo -->
    <img src="{{ url_for('static', filename='images/flogo.png') }}" 
         alt="College Logo" 
         style="
            height: 60px; 
            width: 60px; 
            border-radius: 50%; 
            border: 2px solid #fff;
            object-fit: cover;
         ">
    <!-- College Name & Location -->
    <div style="color: #fff;">
        <h5 style="margin: 0; font-weight: bold; font-size: 1.2rem;">FARWESTERN UNIVERSITY</h5>
        <small style="opacity: 0.8;">Mahendranagar, Kanchanpur</small>
    </div>

</div>
    
<div class="header-right">
    <a href="{{ url_for('profile') }}" class="btn btn-sm btn-primary fw-bold">🧑‍💼 Profile</a>
    <a href="{{ url_for('admin_login') }}" class="btn btn-sm btn-primary fw-bold">
        🛠 Admin Panel
    </a>
</div>

</nav>

<!-- SIDEBAR -->
<div class="sidebar" style="background:#0d6efd; color:#fff; padding:20px; text-align:center; border-radius:0 12px 12px 0;">
    <h4 style="margin:0; display:flex; align-items:center; justify-content:center; gap:1px; font-weight:bold;">
        <img src="{{ url_for('static', filename='images/fWU.png') }}" 
             alt="Logo" 
             style="height:35px; width:35px; border-radius:50%; object-fit:cover;">
        Student Panel
    </h4>


    
    <a href="{{ url_for('user_home') }}">🏠 Home</a>

    <a href="{{ url_for('user_students') }}">👥 Students</a>
    <a href="{{ url_for('user_courses') }}">📚 Courses</a>
    <a href="{{ url_for('user_attendance') }}">🗓 Attendance</a>
    <a href="{{ url_for('user_results') }}">📄 Results</a>
    <a href="{{ url_for('user_notices') }}">📢 Notices</a>
     <a href="{{ url_for('chatbot') }}"> 🗣️ Chat with me</a>
    <a href="{{ url_for('feedback') }}">✍ Feedback</a>
    
    <hr>
    <a href="{{ url_for('logout') }}" class="text-warning">🚪 Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
